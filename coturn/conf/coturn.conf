# ---------- BASIC ----------
listening-port=3478
tls-listening-port=5349

listening-ip=0.0.0.0
relay-ip=0.0.0.0

fingerprint
lt-cred-mech

# ---------- AUTH ----------
use-auth-secret
static-auth-secret=TURN_SECRET_12345   # 🔐 strong secret (keep safe)
realm=talkify.app

# ---------- SECURITY ----------
no-loopback-peers
no-multicast-peers
stale-nonce

# ---------- PERFORMANCE ----------
total-quota=0            # 🔥 unlimited sessions (scaling safe)
bps-capacity=0

# 🔥 REQUIRED FOR HIGH SCALE (ADD THIS)
min-port=49152
max-port=65535

# ---------- DOCKER / PUBLIC IP ----------
# 🔥 IMPORTANT (for Docker + future public IP)
external-ip=127.0.0.1

# ---------- TLS (PRODUCTION READY) ----------
# 🔥 Add later when domain SSL is ready
# cert=/etc/coturn/certs/fullchain.pem
# pkey=/etc/coturn/certs/privkey.pem

# ---------- LOGGING ----------
log-file=stdout           # 🔥 docker friendly
simple-log
verbose                   # 🔥 debugging + monitoring

# ---------- MISC ----------
no-cli
